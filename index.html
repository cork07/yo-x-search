<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
h1{
font-family:"Yu GOthic","游ゴシック",sans-serif;}

p{font-family:Arial, sans-serif;}

.thumbnail {
width: 300px;
border-radius:10px;
margin-bottom:8px;
}
.container {
  max-width: 600px;
  margin: 0 auto;
}
.search-box{
display:flex;
gap:8px;
}
input{
padding:14px;
width:100%;
font-size:18px;
box-sizing:border-box;
}
button{
padding:14px;
font-size:16px;
color:white;
background-color: #2563eb;
}

#result{margin-top:20px;}
</style>
<title>
ヨークスch過去動画検索ツール
</title>  
</head> 

<body>
<div class="container">
<h1>ヨークスch過去動画検索</h1>
<div class="search-box">
<input type="text" id="leader" placeholder="検索したいリーダー">
<button onclick="search()">検索</button>
</div>
<div id="result">対戦動画の検索結果が表示されます</div>
<p>※左側に表示されるリーダーをヨークスが使用します</p>
<p>op16赤エースは「新赤エース」</p>
<p>op15黄ルフィは「空島ルフィ」</p>
<p>op16青バギーは「新青バギー」</p>
<p>st30赤緑ルフィ&エースは「赤緑ルフィ&エース」</p>

</div>


<script>
const videos = [
{title:"緑青ルフィvs黒黄ティーチ 2026.5.14",
leader1:"緑青ルフィ",leader2:"黒黄ティーチ",
url:"https://youtu.be/7LfkppXVTUw?si=nUESEkQaXiYclYY4",
image:"decklist/0514teach.jpg.jpeg"},

{title:"赤緑ルフィ&エースvs緑ボニー 2026.5.12",
leader1:"赤緑ルフィ&エース",leader2:"緑ボニー",
url:"https://youtu.be/JYsyBBdaOf0?si=QWJK25mfTAqMcZK-"},

{title:"新青バギーvs黒黄ティーチ 2026.5.11",
leader1:"新青バギー",leader2:"黒黄ティーチ",
url:"https://youtu.be/xvgZ9swLSQY?si=gZI-_xs9tbLIGU3c"},

{title:"黒黄ティーチvs青黄ハンコック 2026.5.10",
leader1:"黒黄ティーチ",leader2:"青黄ハンコック",
url:"https://youtu.be/W4OHYZViaJc?si=XeKOM2ZOzxrsSJ7c"},

{title:"新青バギーvs青黄ナミ 2026.5.9",
leader1:"新青バギー",leader2:"青黄ナミ",
url:"https://youtu.be/SP47bwEvlWo?si=mZrOQ4Z602cx30Tn"},

{title:"黒黄ティーチvs新赤エース 2026.5.8",
 leader1:"黒黄ティーチ",leader2:"新赤エース",
 url:"https://youtu.be/gwL5HZDaYlQ?si=DGAWPComSJmQ0epb"},

{title:"黒ヤマトvs新赤エース 2026.5.8",
 leader1:"黒ヤマト",leader2:"新赤エース",
 url:"https://youtu.be/fb4QAiR2rRw?si=OcqnD_K2IBMKgFr1"},

{title:"紫エネルvs空島ルフィ 2026.5.6",
leader1:"紫エネル",leader2:"空島ルフィ",
 url:"https://youtu.be/rRWVyADW7WM?si=9JIxccdx_RnxL4ag"},

{title:"新赤エースvs紫エネル 2026.5.6",
leader1:"新赤エース",leader2:"紫エネル",
 url:"https://youtu.be/FTmdJq8Ks4E?si=qtbOgwukj90D3Wa7"},

{title:"黒黄ティーチvs紫エネル 2026.5.4",
leader1:"黒黄ティーチ",leader2:"紫エネル",
url:"https://youtu.be/5CuXI62VaXA?si=Zz-xYe7IEaLmiCq5"},

{title:"緑青ルフィvs青黄ナミ 2026.5.4",
leader1:"緑青ルフィ",leader2:"青黄ナミ",
url:"https://youtu.be/4zR8BPeI3r4?si=1b8x9N7tWvr0A4NH"},

{title:"緑青ルフィvs紫エネル 2026.5.3",
leader1:"緑青ルフィ",leader2:"紫エネル",
url:"https://youtu.be/Uyt4zTKJPsA?si=fXSh6Jz8I0X4D7h4"},

{title:"紫エネルvs青黄ナミ 2026.5.2",
leader1:"紫エネル",leader2:"青黄ナミ",
url:"https://youtu.be/LutBuWTyyH4?si=fjZrmHuOiWjb1UGD"}













]

function search() {
const keyword = document.getElementById("leader").value;
const result = document.getElementById("result");
result.innerHTML = "";
for (const video of videos){
if (video.leader1 === keyword || video.leader2 === keyword){
result.innerHTML += `
<div class="video-card">
<img src="${video.image}" class="thumbnail">
<p>
<a href="${video.url}" target="_blank">
${video.title}
</a>
</p>
</div>
`;
}
}
}
</script>
</body>






</html>
